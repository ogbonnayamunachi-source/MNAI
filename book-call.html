<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book a Call | Munachi AI Studio</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      margin: 0;
    }

    .book-call {
      text-align: center;
      padding: 100px 20px;
      max-width: 700px;
      margin: auto;
    }

    .book-call h1 {
      color: #C6A85E;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .book-call p {
      color: #ccc;
      margin-bottom: 40px;
    }

    .book-call form input,
    .book-call form textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      background: #1a1a1a;
      border: 1px solid #C6A85E;
      color: #fff;
      border-radius: 8px;
    }

    .book-call textarea {
      height: 120px;
    }

    .book-call button {
      background: linear-gradient(135deg, #C6A85E, #E5C97A);
      color: #111;
      padding: 14px 30px;
      border: none;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .book-call button:hover {
      background: #fff;
      color: #000;
    }

    .back-home {
      display: block;
      margin-top: 30px;
      color: #C6A85E;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<section class="book-call">
  <h1>Book a Strategy Call</h1>
  <p>
    Let’s talk about your goals and how Munachi AI Studio can help you grow with AI-powered content and virtual support.
  </p>

  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email Address" required>
    <input type="text" placeholder="Business or Brand Name">
    <textarea placeholder="What would you like to discuss?"></textarea>
    <button type="submit">Book My Call</button>
  </form>

  <a href="munachi-ai.html" class="back-home">← Back to Home</a>
</section>

</body>
</html>
